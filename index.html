<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="section">
  <div class="section-header">
    <div class="section-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-dot"></div>
      <div class="ornament-line"></div>
    </div>
    <span class="eyebrow">Prodotti Selezionati</span>
    <h1 class="section-title">Our <em>Products</em></h1>
    <p class="section-subtitle">Authentic Italian ingredients, carefully selected</p>
    <div class="divider"></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search products…" autocomplete="off">
    </div>

    <div class="filter-sort-row">
      <div class="filters" id="filters"></div>
      <div class="sort-wrap">
        <span class="sort-label">Sort</span>
        <select id="sortSelect">
          <option value="default">Featured</option>
          <option value="az">Name A–Z</option>
          <option value="za">Name Z–A</option>
          <option value="category">Category</option>
        </select>
      </div>
    </div>
  </div>

  <p class="results-meta" id="resultsMeta"></p>
  <div class="grid" id="grid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
